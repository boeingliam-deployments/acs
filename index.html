<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Core.System</div>
        <button class="btn btn-blue" onclick="openLogin()">Sign In</button>
    </nav>

    <div class="container" style="text-align: center; padding-top: 100px;">
        <h1 style="font-size: 4rem; margin: 0;">Secure Gateway.</h1>
        <p style="font-size: 1.2rem; max-width: 600px; margin: 20px auto;">A professional-grade environment for departmental operations and community resource management.</p>
    </div>

    <div id="loginModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
        <div class="card" style="width: 400px; padding: 40px; background: #0a0a0a;">
            <h2 style="margin-top:0;">Identity Check</h2>
            <p>Please enter your credentials to proceed.</p>
            <input type="email" id="user" placeholder="Email Address" style="margin-bottom: 15px;">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn btn-blue" style="width:100%; margin-top:25px;" onclick="handleLogin()">Authorize Access</button>
            <button class="btn" style="background:transparent; color:var(--text-secondary); width:100%; margin-top:10px;" onclick="closeLogin()">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-UvH3k2We00wAcsfCTVYJhgNvb7akjd0",
            authDomain: "rp-portal-7cfdb.firebaseapp.com",
            projectId: "rp-portal-7cfdb",
            storageBucket: "rp-portal-7cfdb.firebasestorage.app",
            messagingSenderId: "1029232195682",
            appId: "1:1029232195682:web:852e8915f3f5293069793b",
            measurementId: "G-BK2QG0M95C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.openLogin = () => document.getElementById('loginModal').style.display='flex';
        window.closeLogin = () => document.getElementById('loginModal').style.display='none';

        window.handleLogin = async () => {
            const email = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                localStorage.setItem('userEmail', res.user.email);
                window.location.href = 'dashboard.html';
            } catch (e) { alert("Access Denied: Check Credentials"); }
        };
    </script>
</body>
</html>
