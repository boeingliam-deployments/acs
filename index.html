<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-logo">HUB</div>
        <button class="btn-primary" onclick="openLogin()">LOGIN</button>
    </nav>

    <div style="text-align:center; margin-top: 15vh;">
        <h1 style="font-size: 3.5rem; margin-bottom: 10px;">Welcome back.</h1>
        <p style="color: var(--text-dim);">The central hub for all community resources.</p>
    </div>

    <div id="loginModal" class="modal-overlay" style="display:none;">
        <div class="glass login-card">
            <h2 style="margin-top:0;">Sign In</h2>
            <input type="text" id="user" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-primary" style="width:100%; margin-top:20px;" onclick="handleLogin()">Continue</button>
            <p onclick="closeLogin()" style="font-size:0.8rem; color:var(--text-dim); cursor:pointer; margin-top:15px;">Go back</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-UvH3k2We00wAcsfCTVYJhgNvb7akjd0",
            authDomain: "rp-portal-7cfdb.firebaseapp.com",
            projectId: "rp-portal-7cfdb",
            storageBucket: "rp-portal-7cfdb.firebasestorage.app",
            messagingSenderId: "1029232195682",
            appId: "1:1029232195682:web:852e8915f3f5293069793b",
            measurementId: "G-BK2QG0M95C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.openLogin = () => document.getElementById('loginModal').style.display='flex';
        window.closeLogin = () => document.getElementById('loginModal').style.display='none';

        window.handleLogin = async () => {
            const email = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                localStorage.setItem('userEmail', res.user.email);
                window.location.href = 'dashboard.html';
            } catch (e) { alert("Invalid login."); }
        };
    </script>
</body>
</html>
