<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ACS | Operational Gateway</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo-container">
            <img src="https://cdn.discordapp.com/emojis/1469497144091217962.webp?size=128" class="acs-logo">
            <div style="font-weight: 800; letter-spacing: 1px;">Auchat Communication System</div>
        </div>
        <button class="btn btn-blue" onclick="document.getElementById('loginModal').style.display='flex'">AUTHORIZE ACCESS</button>
    </nav>

    <div style="text-align: center; padding: 120px 20px;">
        <h1 style="font-size: 4rem; margin: 0; letter-spacing: -2px; font-weight: 800;">Secure Comms.</h1>
        <p style="color: var(--text-secondary); font-size: 1.2rem; max-width: 600px; margin: 25px auto;">
            Created by <b>nswamboguy</b> & developed by <b>boeingliam</b>.
        </p>
    </div>

    <div id="loginModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
        <div class="card" style="width: 350px; text-align: center;">
            <h3>Personnel Login</h3>
            <input type="email" id="user" placeholder="Email Address" style="margin-bottom:10px;">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn btn-blue" style="width:100%; margin-top:20px;" onclick="handleLogin()">VERIFY</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyD-UvH3k2We00wAcsfCTVYJhgNvb7akjd0",
            authDomain: "rp-portal-7cfdb.firebaseapp.com",
            projectId: "rp-portal-7cfdb",
            storageBucket: "rp-portal-7cfdb.firebasestorage.app",
            messagingSenderId: "1029232195682",
            appId: "1:1029232195682:web:852e8915f3f5293069793b"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleLogin = async () => {
            const email = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                localStorage.setItem('userEmail', res.user.email);
                window.location.href = 'dashboard.html';
            } catch (e) { alert("Invalid Credentials"); }
        };
    </script>
</body>
</html>
