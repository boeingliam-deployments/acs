<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>ACS | Dashboard</title>
</head>
<body onload="checkAuth()">
    <div id="hr-banner">
        <span style="font-size: 0.7rem; letter-spacing: 2px;">PRIORITY ONE ALERT</span><br>
        <b id="banner-role"></b>: <span id="banner-text"></span>
    </div>

    <nav>
        <div class="logo-container">
            <img src="https://cdn.discordapp.com/emojis/1469497144091217962.webp?size=128" class="acs-logo">
            <div style="font-weight: 800;">Auchat Communication System</div>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="switchZone" style="display:none;">
                <button class="btn btn-outline" onclick="location.reload()">MAIN MENU</button>
            </div>
            <span id="userBadge"></span>
            <button class="btn btn-outline" onclick="localStorage.clear(); location.href='index.html'">LOGOUT</button>
        </div>
    </nav>

    <div id="prefScreen" style="text-align:center; padding: 50px 5%;">
        <h1>Access Point</h1>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; max-width:900px; margin:40px auto;">
            <div class="card" onclick="showSubMenu('Dept')" style="cursor:pointer"><h3>Department</h3></div>
            <div class="card" onclick="selectRole('Business')" style="cursor:pointer"><h3>Business</h3></div>
            <div class="card" onclick="selectRole('Server')" style="cursor:pointer"><h3>RP Server</h3></div>
        </div>
    </div>

    <div id="deptMenu" style="display:none; text-align:center; padding: 50px 5%;">
        <h1>Select Unit</h1>
        <div style="display:grid; grid-template-columns: 1fr; max-width:400px; margin:40px auto;">
            <div class="card" onclick="selectRole('ASIO')" style="border-color:var(--accent-asio); cursor:pointer">
                <h3 style="color:var(--accent-asio)">ASIO</h3>
                <p>Intelligence & Security</p>
            </div>
        </div>
    </div>

    <div id="mainUI" style="display:none; padding: 20px 5%;">
        <div style="display:grid; grid-template-columns: 280px 1fr; gap:25px;">
            <div class="card">
                <h4 id="currentEnv" style="opacity:0.5"></h4>
                <div id="dynamicNav" style="margin-top:20px;"></div>
            </div>
            <div class="card" id="moduleContent">
                <h2 id="viewTitle"></h2>
                <div id="contentBody"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-UvH3k2We00wAcsfCTVYJhgNvb7akjd0",
            authDomain: "rp-portal-7cfdb.firebaseapp.com",
            projectId: "rp-portal-7cfdb",
            storageBucket: "rp-portal-7cfdb.firebasestorage.app",
            messagingSenderId: "1029232195682",
            appId: "1:1029232195682:web:852e8915f3f5293069793b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const email = localStorage.getItem('userEmail') || "";
        
        const isDev = email.endsWith('@developer.auchat');
        const isExec = email.endsWith('@executive.auchat');
        const isAsioHR = email.endsWith('@asio.hr.auchat');

        let activeSub = null;

        window.checkAuth = () => {
            if(!email) window.location.href = 'index.html';
            const badge = document.getElementById('userBadge');
            if(isDev) badge.innerHTML = `<span style="color:var(--accent-dev)">👑 DEV</span>`;
            else if(isExec) badge.innerHTML = `<span style="color:#ffd700">EXEC</span>`;
            else if(isAsioHR) badge.innerHTML = `<span style="color:var(--accent-asio)">ASIO HR</span>`;
            if(isDev || isExec) document.getElementById('switchZone').style.display = 'block';
        };

        window.showSubMenu = (cat) => {
            document.getElementById('prefScreen').style.display = 'none';
            document.getElementById('deptMenu').style.display = 'block';
        };

        window.selectRole = (role) => {
            document.getElementById('prefScreen').style.display = 'none';
            document.getElementById('deptMenu').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';
            document.getElementById('currentEnv').innerText = role;
            
            const nav = document.getElementById('dynamicNav');
            nav.innerHTML = '';
            const tabs = ['Chat', 'HR Announcements', 'Resources', 'Settings'];
            tabs.forEach(t => nav.innerHTML += `<div class="sidebar-item" onclick="loadTab('${t}', '${role}')">${t}</div>`);
            loadTab('Chat', role);

            // Global Priority Alert Listener
            onSnapshot(query(collection(db, `global_announcements`), orderBy("timestamp", "desc"), limit(1)), (snap) => {
                snap.forEach(d => {
                    const data = d.data();
                    if(data.timestamp && Date.now() - data.timestamp.toMillis() < 10000) {
                        showBanner(data.role, data.text);
                    }
                });
            });
        };

        window.loadTab = (name, role) => {
            if(activeSub) activeSub();
            const body = document.getElementById('contentBody');
            document.getElementById('viewTitle').innerText = name;

            if(name === 'Chat' || name === 'HR Announcements') {
                const isHR = name === 'HR Announcements';
                body.innerHTML = `
                    <div class="chat-container">
                        <div class="scroll-area" id="feedBox"></div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <input type="text" id="inputField" placeholder="Type here..." autocomplete="off">
                            <button class="btn btn-blue" id="actionBtn">SEND</button>
                        </div>
                    </div>`;
                setupLiveFeed(isHR ? `announcements/${role}/posts` : `chats/${role}/messages`, role, isHR);
            } 
            else if(name === 'Settings') {
                body.innerHTML = `
                    <h3>System Preferences</h3>
                    <div class="faq-item" style="margin-bottom:10px;">
                        <h4>My View</h4>
                        <p>Customize your dashboard layout and theme colors.</p>
                        <button class="btn btn-outline" onclick="alert('UI Customization Coming Soon')">Design Settings</button>
                    </div>`;
            }
            else {
                body.innerHTML = `<p>Module ${name} is active.</p>`;
            }
        };

        function setupLiveFeed(path, role, isHR) {
            const input = document.getElementById('inputField');
            const btn = document.getElementById('actionBtn');
            const box = document.getElementById('feedBox');

            activeSub = onSnapshot(query(collection(db, path), orderBy("timestamp", "asc")), (snap) => {
                box.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    const isDevMsg = data.sender.endsWith('@developer.auchat');
                    box.innerHTML += `<div class="msg ${isHR ? 'msg-hr' : ''}">
                        <span class="msg-author ${isDevMsg ? 'dev-text' : ''}">${isDevMsg ? '👑 ' : ''}${data.sender.split('@')[0]}</span>
                        <span>${data.text}</span>
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            const send = async () => {
                if(!input.value.trim()) return;
                const txt = input.value; input.value = '';
                await addDoc(collection(db, path), { sender: email, text: txt, timestamp: serverTimestamp() });
                if(isHR) await addDoc(collection(db, `global_announcements`), { role: role, text: txt, timestamp: serverTimestamp() });
            };
            input.onkeydown = (e) => { if(e.key === 'Enter') send(); };
            btn.onclick = send;
        }

        function showBanner(role, text) {
            const banner = document.getElementById('hr-banner');
            document.getElementById('banner-role').innerText = role + " HR";
            document.getElementById('banner-text').innerText = text;
            banner.classList.add('active');
            setTimeout(() => banner.classList.remove('active'), 7000);
        }
    </script>
</body>
</html>
