<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkAuth()">
    
    <div id="prefScreen" style="padding: 50px 5%;">
        <h1 style="text-align:center;">Select Workspace</h1>
        <div class="pref-grid">
            <div class="glass role-card" onclick="selectRole('Dept')"><h3>Department</h3></div>
            <div class="glass role-card" onclick="selectRole('Biz')"><h3>Business</h3></div>
            <div class="glass role-card" onclick="selectRole('Server')"><h3>RP Server</h3></div>
        </div>
    </div>

    <div id="mainUI" style="display:none;">
        <nav>
            <div id="userLabel" style="font-size: 0.8rem; color: var(--text-dim);"></div>
            <button class="btn-outline" onclick="location.href='index.html'">Sign Out</button>
        </nav>

        <div class="dashboard-container">
            <div class="glass chat-section">
                <div style="padding: 15px; border-bottom: 1px solid var(--glass-border); font-weight:bold;">Community Chat</div>
                <div id="chatMessages" class="message-area"></div>
                <div style="padding:15px;">
                    <input type="text" id="msgIn" placeholder="Type a message..." style="margin:0;">
                </div>
            </div>

            <div class="glass" style="padding:30px;">
                <div id="modTools" style="display:none; margin-bottom:30px; border: 1px solid #ef4444; padding:20px; border-radius:12px;">
                    <h4 style="color:#ef4444; margin-top:0;">Moderator Actions</h4>
                    <input type="text" id="target" placeholder="Search User Email..." style="width:250px;">
                    <button class="btn-primary" style="background:#ef4444;" onclick="alert('Action Sent')">Suspend User</button>
                </div>

                <h2 id="roleTitle">Resources</h2>
                <p id="roleDesc" style="color:var(--text-dim);">Select a module to begin.</p>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;">
                    <div class="glass" style="padding:20px;">Main Resource Tab</div>
                    <div class="glass" style="padding:20px;">Secondary Assets</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkAuth() {
            const email = localStorage.getItem('userEmail');
            if(!email) window.location.href = 'index.html';
            document.getElementById('userLabel').innerText = email;
        }

        function selectRole(role) {
            const email = localStorage.getItem('userEmail');
            document.getElementById('prefScreen').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';

            if(email.endsWith('@safetyofficers.auchat')) {
                document.getElementById('modTools').style.display = 'block';
            }

            document.getElementById('roleTitle').innerText = role + " Workspace";
        }
    </script>
</body>
</html>
