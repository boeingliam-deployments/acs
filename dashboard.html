<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>ACS | Dashboard</title>
</head>
<body onload="checkAuth()">
    <div id="hr-banner">
        <span id="banner-role"></span>: <span id="banner-text"></span>
    </div>

    <nav>
        <div class="logo-container">
            <img src="https://cdn.discordapp.com/emojis/1469497144091217962.webp?size=128" class="acs-logo">
            <div style="font-weight: 800;">Auchat Communication System</div>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="switchZone" style="display:none; gap:10px;">
                <button class="btn btn-outline" onclick="selectRole('Department')">DEPT</button>
                <button class="btn btn-outline" onclick="selectRole('Business')">BIZ</button>
                <button class="btn btn-outline" onclick="selectRole('Server')">SRV</button>
            </div>
            <span id="userBadge"></span>
            <button class="btn btn-outline" onclick="localStorage.clear(); location.href='index.html'">LOGOUT</button>
        </div>
    </nav>

    <div id="prefScreen" style="text-align:center; padding: 80px 5%;">
        <h1>Workspace Selection</h1>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; max-width:900px; margin:40px auto;">
            <div class="card" onclick="selectRole('Department')" style="cursor:pointer"><h3>Department</h3></div>
            <div class="card" onclick="selectRole('Business')" style="cursor:pointer"><h3>Business</h3></div>
            <div class="card" onclick="selectRole('Server')" style="cursor:pointer"><h3>RP Server</h3></div>
        </div>
    </div>

    <div id="mainUI" style="display:none; padding: 30px 5%;">
        <div style="display:grid; grid-template-columns: 300px 1fr; gap:25px;">
            <div class="card">
                <h4 id="currentEnv">ENVIRONMENT</h4>
                <div id="dynamicNav"></div>
            </div>

            <div class="card" id="moduleContent">
                <h2 id="viewTitle">Initialize...</h2>
                <div id="contentBody"></div>
            </div>
        </div>
    </div>

    <script>
        const email = localStorage.getItem('userEmail') || "";
        const isDev = email.endsWith('@developer.auchat');
        const isExec = email.endsWith('@executive.auchat');
        const isAsioHR = email.endsWith('@asio.hr.auchat');

        const navData = {
            'Department': ['Chat', 'HR Announcements', 'Roles', 'Resources'],
            'Business': ['Commissions', 'Chat', 'Improvements', 'Announcements', 'Assets'],
            'Server': ['Announcements', 'Chat', 'Moderation & Log', 'RP Stuff']
        };

        function checkAuth() {
            if(!email) window.location.href = 'index.html';
            const badge = document.getElementById('userBadge');
            if(isDev) badge.innerHTML = `<span style="color:var(--accent-dev); font-weight:900;">👑 DEVELOPER</span>`;
            else if(isExec) badge.innerHTML = `<span style="color:#ffd700;">EXEC</span>`;
            else if(isAsioHR) badge.innerHTML = `<span style="color:var(--accent-asio);">ASIO HR</span>`;
            
            // Devs/Execs can switch easily
            if(isDev || isExec) document.getElementById('switchZone').style.display = 'flex';
        }

        function selectRole(role) {
            document.getElementById('prefScreen').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';
            document.getElementById('currentEnv').innerText = role.toUpperCase();
            
            const nav = document.getElementById('dynamicNav');
            nav.innerHTML = '';
            navData[role].forEach(n => {
                nav.innerHTML += `<div class="sidebar-item" onclick="loadTab('${n}', '${role}')">${n}</div>`;
            });
            loadTab('Chat', role);
        }

        function loadTab(name, role) {
            const body = document.getElementById('contentBody');
            document.getElementById('viewTitle').innerText = name;

            if(name === 'Chat') {
                body.innerHTML = `
                    <div class="chat-container">
                        <div class="chat-messages" id="chatBox">
                            <div class="msg"><span class="msg-author">[SYSTEM]</span> Welcome to ${role} encrypted communications.</div>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="chatIn" placeholder="Send message...">
                            <button class="btn btn-blue" onclick="sendChat()">SEND</button>
                        </div>
                    </div>`;
            } else if(name.includes('Announcements')) {
                let controls = (isDev || isExec || isAsioHR) ? `
                    <div style="margin-bottom:20px;">
                        <input type="text" id="annText" placeholder="Broadcast message...">
                        <button class="btn btn-red" style="margin-top:10px;" onclick="broadcast('${role}')">SEND URGENT BANNER</button>
                    </div>` : '';
                body.innerHTML = controls + `<div class="card">Recent Announcements will appear here.</div>`;
            } else if(name === 'Roles' || name.includes('Moderation')) {
                if(isDev || isExec || isAsioHR) {
                    body.innerHTML = `
                        <h4>Role Management</h4>
                        <input type="text" placeholder="Role Name...">
                        <button class="btn btn-blue" style="margin-top:10px;">CREATE ROLE</button>
                        <button class="btn btn-outline" style="margin-top:10px;">ASSIGN PERMS</button>
                    `;
                } else {
                    body.innerHTML = `<p>Access Denied. You do not have HR permissions for this department.</p>`;
                }
            } else {
                body.innerHTML = `<div class="card">Standard module resources for ${role} are being retrieved.</div>`;
            }
        }

        function sendChat() {
            const input = document.getElementById('chatIn');
            const box = document.getElementById('chatBox');
            if(!input.value) return;
            
            let authorClass = isDev ? 'dev-text' : '';
            let icon = isDev ? '👑 ' : '';
            
            box.innerHTML += `
                <div class="msg">
                    <span class="msg-author ${authorClass}">${icon}${email.split('@')[0]}</span>
                    <span class="${authorClass}">${input.value}</span>
                </div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;
        }

        function broadcast(role) {
            const msg = document.getElementById('annText').value;
            const banner = document.getElementById('hr-banner');
            document.getElementById('banner-role').innerText = role + " HR";
            document.getElementById('banner-text').innerText = msg;
            
            banner.classList.add('active');
            setTimeout(() => banner.classList.remove('active'), 5000);
        }
    </script>
</body>
</html>
